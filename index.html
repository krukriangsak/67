<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Hand Tracking Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #webcam {
            display: none;
        }
        #output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #score-board {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="score-board">คะแนน: <span id="score">0</span></div>
</div>

<script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('score');

    let score = 0;
    let lastRaisedHand = null; 

    function resizeCanvas() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.restore();

        if (results.multiHandedness && results.multiHandLandmarks) {
            for (let i = 0; i < results.multiHandedness.length; i++) {
                const classification = results.multiHandedness[i];
                const landmarks = results.multiHandLandmarks[i];
                
                let handType = classification.label === 'Left' ? 'Right' : 'Left';
                
                const wristX = (1 - landmarks[0].x) * canvasElement.width; 
                const wristY = landmarks[0].y * canvasElement.height;

                const isHandRaised = landmarks[8].y < landmarks[0].y; 

                if (isHandRaised) {
                    canvasCtx.font = "bold 80px Arial";
                    canvasCtx.textAlign = "center";
                    canvasCtx.textBaseline = "middle";

                    if (handType === 'Left') {
                        canvasCtx.fillStyle = "#ff3366";
                        canvasCtx.fillText("6", wristX, wristY - 50);

                        if (lastRaisedHand !== 'Left') {
                            score++;
                            scoreElement.innerText = score;
                            lastRaisedHand = 'Left';
                        }
                    } else if (handType === 'Right') {
                        canvasCtx.fillStyle = "#33ccff";
                        canvasCtx.fillText("7", wristX, wristY - 50);

                        if (lastRaisedHand !== 'Right') {
                            score++;
                            scoreElement.innerText = score;
                            lastRaisedHand = 'Right';
                        }
                    }
                }
            }
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    camera.start();
</script>

</body>
</html>
