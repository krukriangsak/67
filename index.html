<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ผู้นำเทรนด์ AR 2026 - เวอร์ชัน HTML สแตนด์อโลน</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #webcam { display: none; }
        #output_canvas { width: 100%; height: 100%; object-fit: cover; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center;
        }

        #score-board {
            margin-top: 25px; background: rgba(0, 0, 0, 0.8); color: #00ffcc;
            padding: 10px 40px; border-radius: 50px; font-size: 32px; font-weight: bold;
            border: 2px solid #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        #victory-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); padding: 40px; border-radius: 30px;
            text-align: center; display: none; border: 4px solid #00ffcc; z-index: 100;
        }

        .victory-title { color: #00ffcc; font-size: 50px; margin-bottom: 10px; }
        .victory-subtitle { color: #fff; font-size: 24px; margin-bottom: 20px; }
        
        #restart-btn {
            display: inline-block; padding: 20px 40px; background: #00ffcc; color: #000;
            font-size: 28px; font-weight: bold; border-radius: 15px; margin-top: 20px;
            border: 5px solid #fff;
        }
        
        /* ไฮไลท์สีปุ่มเมื่อใช้นิ้วชี้ไปแตะโดน */
        #restart-btn.active { background: #fff; transform: scale(1.1); }
    </style>
</head>
<body>
<div id="container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="ui-layer">
        <div id="score-board">คะแนนปัจจุบัน: <span id="score">0</span> / 100</div>
    </div>

    <div id="victory-panel">
        <div class="victory-title">ยินดีด้วย! 👑</div>
        <div class="victory-subtitle">คุณคือผู้นำเทรนด์<br>20 + 20 + 20 + 7</div>
        <p style="font-size: 40px;">🔥 ✨ ⚡ 🚀</p>
        <div id="restart-btn">ใช้ "นิ้วชี้" แตะตรงนี้เพื่อเล่นใหม่</div>
    </div>
</div>

<script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('score');
    const victoryPanel = document.getElementById('victory-panel');
    const restartBtn = document.getElementById('restart-btn');

    let score = 0;
    let currentQuadrant = null;
    let isGameOver = false;

    // --- AUDIO SYSTEM (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep(freq, duration, type = 'sine') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playVictoryTune() {
        const notes = [523.25, 659.25, 783.99, 1046.50]; // คอร์ด C-E-G-C ไล่เสียงขึ้น
        notes.forEach((f, i) => {
            setTimeout(() => playBeep(f, 0.5, 'square'), i * 150);
        });
    }

    function resetGame() {
        score = 0;
        scoreElement.innerText = score;
        victoryPanel.style.display = 'none';
        currentQuadrant = null;
        isGameOver = false;
        playBeep(440, 0.2); // เสียงบี๊บแจ้งเตือนเมื่อกดเริ่มใหม่
    }

    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // กลับหน้ากล้อง (Mirror Effect) เพื่อให้เคลื่อนไหวมือได้เป็นธรรมชาติ
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks && results.multiHandedness) {
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];
                const handedness = results.multiHandedness[i].label; 
                
                // วาดเส้นโครงสร้างมือและจุดข้อต่อ
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#00ffcc', lineWidth: 1, radius: 5});

                // คำนวณการหงายมือ/คว่ำมือ (Vector Cross Product)
                const v1 = { x: landmarks[5].x - landmarks[0].x, y: landmarks[5].y - landmarks[0].y };
                const v2 = { x: landmarks[17].x - landmarks[0].x, y: landmarks[17].y - landmarks[0].y };
                const crossZ = v1.x * v2.y - v1.y * v2.x;
                const isPalmFacing = handedness === 'Left' ? crossZ > 0 : crossZ < 0;

                const indexTip = landmarks[8];
                const wrist = landmarks[0];
                const drawX = (1 - wrist.x) * canvasElement.width;
                const drawY = wrist.y * canvasElement.height;

                // --- LOGIC ปุ่มกดเริ่มใหม่ไร้สัมผัส (ใช้นิ้วชี้แตะกลางอากาศ) ---
                if (isGameOver) {
                    const btnRect = restartBtn.getBoundingClientRect();
                    const fingerX = (1 - indexTip.x) * window.innerWidth;
                    const fingerY = indexTip.y * window.innerHeight;

                    if (fingerX > btnRect.left && fingerX < btnRect.right && 
                        fingerY > btnRect.top && fingerY < btnRect.bottom) {
                        restartBtn.classList.add('active');
                        setTimeout(resetGame, 500); // หน่วงเวลา 0.5 วินาทีเพื่อให้รู้สึกเหมือนการกดปุ่ม
                    } else {
                        restartBtn.classList.remove('active');
                    }
                }

                // --- LOGIC การนับคะแนนแบบแบ่งโซน 4 ทิศทาง (Spatial Quadrant) ---
                if (!isGameOver && isPalmFacing) {
                    let quad = (wrist.x < 0.5 ? "L" : "R") + (wrist.y < 0.5 ? "T" : "B");
                    
                    if (quad !== currentQuadrant) {
                        score++;
                        currentQuadrant = quad;
                        scoreElement.innerText = score;
                        playBeep(handedness === 'Left' ? 880 : 1100, 0.1); // เสียงปิ๊บตอนแต้มขึ้น
                        
                        if (score >= 100) {
                            isGameOver = true;
                            victoryPanel.style.display = 'block';
                            playVictoryTune(); // เล่นเพลงฉลองชัยชนะ
                        }
                    }

                    // วาดเฉพาะตัวเลขขนาดใหญ่ลอยบนมือ (ไม่แสดงข้อความอื่นบนมือ)
                    canvasCtx.restore();
                    canvasCtx.save();
                    canvasCtx.font = "bold 250px 'Segoe UI'";
                    canvasCtx.textAlign = "center";
                    canvasCtx.fillStyle = wrist.x > 0.5 ? "#ff3366" : "#33ccff";
                    canvasCtx.fillText(wrist.x > 0.5 ? "6" : "7", drawX, drawY);
                    canvasCtx.restore();
                    canvasCtx.save();
                    canvasCtx.translate(canvasElement.width, 0);
                    canvasCtx.scale(-1, 1);
                } else if (!isPalmFacing) {
                    currentQuadrant = null;
                }
            }
        }
        canvasCtx.restore();
    }

    // กำหนดค่าและเรียกใช้งาน MediaPipe Hands
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    // เปิดใช้งานกล้องเว็บแคม
    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();

    // จัดการขนาดหน้าจอให้เต็มจอตลอดเวลา
    function resize() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
